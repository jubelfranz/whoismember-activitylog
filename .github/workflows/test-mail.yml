name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          # Wir nutzen die Secrets direkt
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BuildHub Final Win"
          to: support@einfachalles.at
          # WICHTIG: Brevo verlangt oft, dass der Absender die registrierte E-Mail ist
          from: ${{ secrets.MAIL_USERNAME }}
          body: "GitHub to Brevo Connection Success!"
