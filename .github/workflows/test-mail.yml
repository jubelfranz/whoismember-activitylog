name: Email Connection Test

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: host47.ssl-net.net
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BuildHub Test"
          to: support@einfachalles.at
          # WICHTIG: Nur die nackte Adresse, kein Name!
          from: support@einfachalles.at
          body: "Connection Successful for ${{ github.repository }}"
