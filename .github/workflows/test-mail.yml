name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v4
        with:
          # Wir nutzen jetzt die SMTPS Einstellungen aus deinem Bild
          server_address: host47.ssl-net.net
          server_port: 465
          secure: true # Wichtig für Port 465 (SSL/TLS)
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BuildHub Connectivity Test: ${{ github.repository }}"
          to: support@einfachalles.at
          # Wir setzen 'from' auf die nackte Email-Adresse für maximale Kompatibilität
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Connectivity Check Successful!
            
            Repository: ${{ github.repository }}
            Server: host47.ssl-net.net (Port 465)
            Status: Connection established via Node 24.
