name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v3
        with:
          # KORREKTUR: Reiner Hostname ohne Sonderzeichen
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          
          # Daten aus den GitHub Secrets (Brevo Login & SMTP-Key)
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          subject: "BuildHub SUCCESS: Cloud Mail active"
          to: support@einfachalles.at
          # WICHTIG: Muss eine bei Brevo verifizierte E-Mail sein
          from: support@einfachalles.at
          body: |
            Sieg! Die Mail-Brücke steht.
            Dieser Versand erfolgt über Brevo SMTP-Relay.
            Repo: ${{ github.repository }}
