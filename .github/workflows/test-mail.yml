name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v3
        with:
          # Wir nutzen Brevo, da dein Hoster Skripte blockiert
          server_address: ://brevo.com
          server_port: 587
          secure: false # STARTTLS ist Standard bei Port 587
          
          # Zugangsdaten aus den Secrets
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          subject: "BuildHub SUCCESS: Cloud Mail active"
          to: support@einfachalles.at
          # WICHTIG: Die Absender-Adresse muss bei Brevo verifiziert sein!
          from: support@einfachalles.at
          body: |
            Sieg! Die Mail-Brücke steht.
            Dieser Versand erfolgt über Brevo, um die Hoster-Blockade zu umgehen.
            Repo: ${{ github.repository }}
