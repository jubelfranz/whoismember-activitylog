name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v3
        with:
          # KORREKTUR: Nur der Hostname, ohne ://
          server_address: smtp-relay.brevo.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BuildHub SUCCESS: ${{ github.repository }}"
          to: support@einfachalles.at
          from: BuildHub Maker <${{ secrets.MAIL_USERNAME }}>
          body: |
            Connectivity Finalized!
            The GitHub-to-Email bridge is now working via Brevo SMTP Relay.
            
            Repository: ${{ github.repository }}
