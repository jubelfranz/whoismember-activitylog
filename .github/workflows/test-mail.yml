name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: host47.ssl-net.net
          server_port: 587
          secure: false # STARTTLS verwenden
          # WICHTIG: Falls dein Passwort Sonderzeichen hat, 
          # tippe es bei GitHub Secrets manuell ein!
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BuildHub Final Debug Test"
          to: support@einfachalles.at
          from: support@einfachalles.at
          # Dieser Parameter ist oft der Retter bei restriktiven Hostern:
          connection_timeout: 20
