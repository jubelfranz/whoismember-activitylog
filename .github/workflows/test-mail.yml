name: Test SMTP Connection

on:
  repository_dispatch:
    types: [test_mail_trigger]

jobs:
  test_mail:
    runs-on: ubuntu-latest
    env:
      # Verhindert die Node-Deprecation Warnung
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Send Test Email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: host47.ssl-net.net
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BuildHub Connectivity Test: ${{ github.event.client_payload.version }}"
          to: support@einfachalles.at
          # WICHTIG: Muss exakt MAIL_USERNAME entsprechen!
          from: BuildHub Maker <${{ secrets.MAIL_USERNAME }}>
          body: |
            Connectivity Check Successful!
            
            Repository: ${{ github.repository }}
            Version: ${{ github.event.client_payload.version }}
            
            Your BuildHub is now connected and future-proof (Node 24).
